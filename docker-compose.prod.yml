# ─── Production compose ───────────────────────────────────────────────────────
# All values are read from .env via Docker Compose's automatic variable
# substitution (${VAR}) and env_file injection into each container.
#
# Usage (on the VPS):
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml up -d --build   # after a code push
#   docker compose -f docker-compose.prod.yml logs -f app     # tail logs

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ecom_postgres
    restart: always
    env_file: .env # loads POSTGRES_USER / PASSWORD / DB into container
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Port NOT exposed to host — app reaches it on the internal Docker network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ecom_redis
    restart: always
    env_file: .env
    command: redis-server --requirepass ${REDIS_PASSWORD} --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    # Port NOT exposed to host
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── App (production image) ────────────────────────────────────────────────────
  app:
    build:
      context: .
      target: runner # lean Alpine image, non-root user
    container_name: ecom_app
    restart: always
    env_file: .env # loads all app env vars from .env
    environment:
      NODE_ENV: production
      # Override DB/Redis to point at sibling containers, not localhost
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "127.0.0.1:${PORT:-5000}:${PORT:-5000}" # loopback only — Nginx proxies from outside
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Migration runner (one-shot, exits after completing) ───────────────────────
  migrate:
    build:
      context: .
      target: builder
    container_name: ecom_migrate
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
    command: npx prisma migrate deploy
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

volumes:
  postgres_data:
  redis_data:
