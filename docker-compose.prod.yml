# ─── Production compose override ─────────────────────────────────────────────
# Usage (on the VPS):
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml up -d --build   # after a code push
#   docker compose -f docker-compose.prod.yml logs -f app     # tail logs
#   docker compose -f docker-compose.prod.yml exec app npx prisma migrate deploy
#   docker compose -f docker-compose.prod.yml exec app node prisma/seed.js

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ecom_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Not exposing port 5432 to host in production — app talks to it on internal network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ecom_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── App (production image) ────────────────────────────────────────────────────
  app:
    build:
      context: .
      target: runner        # use the lean production stage
    container_name: ecom_app
    restart: always
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "127.0.0.1:5000:5000"   # bind to loopback only — Nginx proxies from outside
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Database migration runner (one-shot, exits after running) ─────────────────
  migrate:
    build:
      context: .
      target: builder
    container_name: ecom_migrate
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
    command: npx prisma migrate deploy
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

volumes:
  postgres_data:
  redis_data:
