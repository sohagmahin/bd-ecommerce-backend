# ─── Local development compose ────────────────────────────────────────────────
# Usage:
#   docker compose up              # start all services
#   docker compose up --build      # rebuild app image first
#   docker compose down -v         # stop and remove volumes

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ecom_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ecom_user
      POSTGRES_PASSWORD: ecom_pass
      POSTGRES_DB: bd_ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecom_user -d bd_ecommerce"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ecom_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── App (dev — hot reload via nodemon) ────────────────────────────────────────
  app:
    build:
      context: .
      target: builder      # use the builder stage so devDeps (nodemon) are present
    container_name: ecom_app
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://ecom_user:ecom_pass@postgres:5432/bd_ecommerce?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "5000:5000"
    volumes:
      # Mount source for live reload — node_modules stays inside container
      - .:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
