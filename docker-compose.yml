# ─── Local development compose ────────────────────────────────────────────────
# All values are read from .env via Docker Compose's automatic variable
# substitution (${VAR}) and env_file injection into each container.
#
# Usage:
#   docker compose up              # start all services
#   docker compose up --build      # rebuild app image first
#   docker compose down -v         # stop and remove volumes

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ecom_postgres
    restart: unless-stopped
    env_file: .env                  # loads POSTGRES_USER / PASSWORD / DB into container
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ecom_redis
    restart: unless-stopped
    # Start with password only if REDIS_PASSWORD is set in .env
    command: >
      sh -c "if [ -n '${REDIS_PASSWORD}' ];
             then redis-server --requirepass ${REDIS_PASSWORD} --save 60 1 --loglevel warning;
             else redis-server --save 60 1 --loglevel warning;
             fi"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: >
        sh -c "if [ -n '${REDIS_PASSWORD}' ];
               then redis-cli -a ${REDIS_PASSWORD} ping;
               else redis-cli ping;
               fi"
      interval: 10s
      timeout: 5s
      retries: 5

  # ── App (dev — hot reload via nodemon) ────────────────────────────────────────
  app:
    build:
      context: .
      target: builder               # builder stage has devDeps (nodemon)
    container_name: ecom_app
    restart: unless-stopped
    env_file: .env                  # loads all app env vars from .env
    environment:
      NODE_ENV: development
      # Override DB/Redis to point at sibling containers, not localhost
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    volumes:
      # Mount source for live reload — node_modules stays inside container
      - .:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
