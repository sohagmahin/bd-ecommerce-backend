# /etc/nginx/sites-available/bd-ecommerce
# symlink: ln -s /etc/nginx/sites-available/bd-ecommerce /etc/nginx/sites-enabled/

upstream api_backend {
    # Node.js / PM2 cluster on port 5000
    server 127.0.0.1:5000;
    keepalive 64;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name api.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.yourdomain.com;

    # ─── TLS (managed by Certbot / Let's Encrypt) ───────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ─── Security headers (Cloudflare handles most, belt-and-suspenders) ────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Request limits ───────────────────────────────────────────────────────
    client_max_body_size 15M;         # for image uploads
    client_body_timeout  30s;
    keepalive_timeout    65s;

    # ─── Proxy to Node ────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90s;
    }

    location /health {
        proxy_pass http://api_backend;
    }

    # Block access to hidden files
    location ~ /\. {
        deny all;
    }
}
